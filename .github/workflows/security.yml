name: Security Scan

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: '30 6 * * 1'  # 每周一 UTC 6:30
  workflow_dispatch:

jobs:
  # CodeQL is handled by GitHub's default setup (Settings → Code security).
  # The advanced workflow config conflicts with default setup when both are active.

  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: temurin
          cache: maven

      - name: Build & install protocol module
        run: mvn -B install -pl protocol -DskipTests --also-make

      - name: Run OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mvn -B org.owasp:dependency-check-maven:check \
            -pl protocol \
            -Dformat=HTML \
            -Dformat=JSON \
            -DfailBuildOnCVSS=7 \
            -DassemblyAnalyzerEnabled=false \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }}

      - name: Upload Dependency-Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: protocol/target/dependency-check-*.*
