name: Release on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - name: Install openTCS 7.2.1 to local Maven repo
        run: |
          curl -sL "https://github.com/openTCS/openTCS/releases/download/v7.2.1/opentcs-7.2.1-bin.zip" -o opentcs.zip
          unzip -q opentcs.zip
          LIB="opentcs-7.2.1-bin/opentcs-kernel/lib"
          # Install each JAR with a minimal POM (no transitive deps)
          for jar in "$LIB"/opentcs-*.jar; do
            filename=$(basename "$jar" .jar)
            artifactId=$(echo "$filename" | sed 's/-[0-9].*$//')
            version="7.2.1"
            # Create minimal POM
            cat > /tmp/pom.xml <<EOF
          <project>
            <modelVersion>4.0.0</modelVersion>
            <groupId>org.opentcs</groupId>
            <artifactId>${artifactId}</artifactId>
            <version>${version}</version>
          </project>
          EOF
            mvn install:install-file -Dfile="$jar" -DpomFile=/tmp/pom.xml -q
            echo "Installed: $artifactId"
          done

      - name: Build (skip tests)
        run: mvn -B clean package -DskipTests -o

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            ## openTCS Kecong UDP Driver v${{ steps.version.outputs.VERSION }}

            ### 文件
            - `kecong-opentcs-protocol-${{ steps.version.outputs.VERSION }}.jar` — 协议模块
            - `kecong-opentcs-driver-${{ steps.version.outputs.VERSION }}.jar` — 驱动模块

            ### 安装
            将两个 JAR 复制到 `opentcs-kernel/lib/openTCS-extensions/` 目录下，重启 Kernel 即可。
          files: |
            protocol/target/kecong-opentcs-protocol-*.jar
            adapter/target/kecong-opentcs-driver-*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
