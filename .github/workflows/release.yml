name: Release on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Install openTCS api-base to local repo
        run: |
          curl -sL "https://github.com/openTCS/openTCS/releases/download/v7.2.1/opentcs-7.2.1-bin.zip" -o opentcs.zip
          unzip -q opentcs.zip
          mvn install:install-file \
            -Dfile=opentcs-7.2.1-bin/opentcs-kernel/lib/opentcs-api-base-7.2.1.jar \
            -DgroupId=org.opentcs -DartifactId=opentcs-api-base -Dversion=7.2.1 \
            -Dpackaging=jar -DgeneratePom=true

      - name: Build (skip tests)
        id: build
        run: |
          echo "=== Java version ===" > build.log
          java -version 2>>build.log
          echo "=== Maven version ===" >> build.log
          mvn --version >> build.log 2>&1
          echo "=== Installed openTCS API JAR ===" >> build.log
          ls -la ~/.m2/repository/org/opentcs/opentcs-api-base/7.2.1/ >> build.log 2>&1
          echo "=== Dependency resolve ===" >> build.log
          mvn -B dependency:resolve -pl adapter >> build.log 2>&1 || true
          echo "=== Building ===" >> build.log
          mvn -B -e clean package -Dmaven.test.skip=true >> build.log 2>&1
          BUILD_EXIT=$?
          cat build.log
          exit $BUILD_EXIT

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-build-log
          path: build.log
          retention-days: 1

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            ## openTCS Kecong UDP Driver v${{ steps.version.outputs.VERSION }}

            ### 文件
            - `kecong-opentcs-protocol-${{ steps.version.outputs.VERSION }}.jar` — 协议模块
            - `kecong-opentcs-driver-${{ steps.version.outputs.VERSION }}.jar` — 驱动模块

            ### 安装
            将两个 JAR 复制到 `opentcs-kernel/lib/openTCS-extensions/` 目录下，重启 Kernel 即可。
          files: |
            protocol/target/kecong-opentcs-protocol-*.jar
            adapter/target/kecong-opentcs-driver-*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
