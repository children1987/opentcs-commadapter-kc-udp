name: Release on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build openTCS from source and install to local repo
        run: |
          # Clone openTCS 7.2.1
          git clone --depth 1 --branch v7.2.1 https://github.com/openTCS/openTCS.git opentcs-src
          cd opentcs-src
          # Build only the modules we need
          chmod +x gradlew
          ./gradlew :opentcs-api-base:publishToMavenLocal :opentcs-kernel:publishToMavenLocal -x test --no-daemon

      - name: Build driver
        run: mvn -B clean package -DskipTests

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            ## openTCS Kecong UDP Driver v${{ steps.version.outputs.VERSION }}

            ### 文件
            - `kecong-opentcs-protocol-${{ steps.version.outputs.VERSION }}.jar` — 协议模块
            - `kecong-opentcs-driver-${{ steps.version.outputs.VERSION }}.jar` — 驱动模块

            ### 安装
            将两个 JAR 复制到 `opentcs-kernel/lib/openTCS-extensions/` 目录下，重启 Kernel 即可。
          files: |
            protocol/target/kecong-opentcs-protocol-*.jar
            adapter/target/kecong-opentcs-driver-*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
