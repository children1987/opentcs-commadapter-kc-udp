name: Release on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build & Test
        run: mvn -B clean package -pl protocol -DskipTests=false

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🚀 openTCS Kecong UDP Driver v${{ steps.version.outputs.VERSION }}

            ### 变更
            见 [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})

            ### 协议模块 JAR
            - `kecong-opentcs-protocol-${{ steps.version.outputs.VERSION }}.jar`

            ### 安装
            ```bash
            mvn install:install-file \
              -Dfile=kecong-opentcs-protocol-${{ steps.version.outputs.VERSION }}.jar \
              -DgroupId=com.kecong.opentcs \
              -DartifactId=kecong-opentcs-protocol \
              -Dversion=${{ steps.version.outputs.VERSION }} \
              -Dpackaging=jar
            ```
          files: protocol/target/kecong-opentcs-protocol-*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
